name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Xcode version
        run: xcodebuild -version

      - name: Build .app unsigned
        run: |
          xcodebuild \
            -project "Erinnerungen app ios/MemoPing.xcodeproj" \
            -scheme "MemoPing" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "${{ github.workspace }}/DerivedData" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO \
            clean build

      - name: Package .ipa
        run: |
          APP_PATH=$(find "${{ github.workspace }}/DerivedData" \
            -name "MemoPing.app" \
            -path "*/Release-iphoneos/*" \
            | head -1)

          echo "APP_PATH: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "FEHLER: MemoPing.app nicht gefunden!"
            find "${{ github.workspace }}/DerivedData" -name "*.app"
            exit 1
          fi

          rm -rf "${{ github.workspace }}/ipa_staging"
          mkdir -p "${{ github.workspace }}/ipa_staging/Payload"
          cp -R "$APP_PATH" "${{ github.workspace }}/ipa_staging/Payload/"

          cd "${{ github.workspace }}/ipa_staging"
          zip -r "../MemoPing.ipa" Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MemoPing-${{ github.sha }}
          path: ${{ github.workspace }}/MemoPing.ipa
          retention-days: 30
          
